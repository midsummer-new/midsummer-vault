version: 2

builds:
  - main: ./cmd/vault
    binary: vault
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/Reichel1/midsummer/vault-cli/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "vault-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
