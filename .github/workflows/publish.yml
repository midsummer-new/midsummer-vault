name: Publish
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            npm_pkg: midsummerai-vault-darwin-arm64
          - goos: darwin
            goarch: amd64
            npm_pkg: midsummerai-vault-darwin-x64
          - goos: linux
            goarch: amd64
            npm_pkg: midsummerai-vault-linux-x64
          - goos: linux
            goarch: arm64
            npm_pkg: midsummerai-vault-linux-arm64
          - goos: windows
            goarch: amd64
            npm_pkg: midsummerai-vault-win32-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY=vault
          if [ "$GOOS" = "windows" ]; then BINARY=vault.exe; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w -X github.com/Reichel1/midsummer/vault-cli/internal/cli.Version=${VERSION}" \
            -o "${BINARY}" ./cmd/vault/
          mkdir -p "npm/${{ matrix.npm_pkg }}/bin"
          mv "${BINARY}" "npm/${{ matrix.npm_pkg }}/bin/"
      - name: Set version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd "npm/${{ matrix.npm_pkg }}"
          node -e "const p=require('./package.json');p.version='${VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}
  publish:
    name: Publish npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in artifacts/midsummerai-vault-*/; do
            echo "Publishing $(basename $pkg)..."
            cd "$pkg" && npm publish --access public || true && cd -
          done
      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          cd npm/midsummerai-vault
          V="${VERSION#v}"
          node -e "const p=require('./package.json');p.version='${V}';for(const[k]of Object.entries(p.optionalDependencies||{}))p.optionalDependencies[k]='${V}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish --access public
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "Midsummer Vault $TAG" --generate-notes
